/* -------------------------------------------------------------------------
   NEXT EPISODE BUTTON VISIBILITY  –  called on each episode change
   Hides the button if the next episode key is absent from the season JSON.
   ------------------------------------------------------------------------- */
async function updateNextEpisodeButtonVisibility() {
    const nextEpisodeButton = document.getElementById('next-episode-button');
    const tvMatch = window.location.pathname.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i)
                 || window.location.pathname.match(/\/tv\/(\d+)\/(\d+)\/(\d+)/);

    if (!tvMatch) {
        nextEpisodeButton.classList.add('hidden');
        return;
    }

    // Optimistically hide while we check, so the button never briefly shows wrong
    nextEpisodeButton.classList.add('hidden');

    const seriesId     = tvMatch[1];
    const seasonNumber = Number(tvMatch[2]);
    const nextEpisode  = Number(tvMatch[3]) + 1;

    try {
        const githubJsonUrl =
            `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/tv/${seriesId}/S${seasonNumber}.json`;
        const res  = await fetch(githubJsonUrl, { cache: 'no-store' });
        if (!res.ok) return; // Can't confirm next episode — keep hidden

        const data = await res.json();
        if (data[nextEpisode]) {
            nextEpisodeButton.classList.remove('hidden');
        }
        // Otherwise stays hidden — next episode doesn't exist in JSON
    } catch (e) {
        // Network/parse error — keep button hidden to avoid dead clicks
        console.warn('updateNextEpisodeButtonVisibility failed:', e.message);
    }
}

/* -------------------------------------------------------------------------
   PER-PLAYBACK SETUP  –  called each time a new stream starts
   ------------------------------------------------------------------------- */
function setupInactivityDetection() {
    if (!isHlsJsMode && video.audioTracks) video.audioTracks.addEventListener('change', renderTracksMenu);

    lastKnownVolume = video.volume > 0 ? video.volume : 0.5;
    updateProgress(); updateBufferProgress(); updateVolumeSlider(); updateFullscreenIcon();
    updateNextEpisodeButtonVisibility();
    updateEpisodePanelButtonVisibility();

    if (video.paused || video.ended) {
        showControls();
        updateBottomPlayPauseIcon(true);
        updateCenterPlayPauseIcon(true);
    } else {
        updateBottomPlayPauseIcon(false);
        updateCenterPlayPauseIcon(false);
        resetInactivityTimer();
    }
}

/* -------------------------------------------------------------------------
   VOLUME SLIDER
   ------------------------------------------------------------------------- */
function calculateNewVolume(clientY) {
    const rect = volumeSliderTrack.getBoundingClientRect();
    let dist = rect.bottom - clientY;
    dist = Math.max(0, Math.min(dist, rect.height));
    return dist / rect.height;
}
function handleVolumeAdjust(e) {
    e.preventDefault();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const vol = calculateNewVolume(y);
    video.volume = vol;
    if (vol > 0) { video.muted = false; lastKnownVolume = vol; }
    else video.muted = true;
    updateVolumeSlider();
}
function startVolumeAdjusting(e) {
    isVolumeAdjusting = true;
    e.preventDefault();
    window.addEventListener('mousemove', handleVolumeAdjust);
    window.addEventListener('mouseup', endVolumeAdjusting);
    window.addEventListener('touchmove', handleVolumeAdjust);
    window.addEventListener('touchend', endVolumeAdjusting);
    handleVolumeAdjust(e);
}
function endVolumeAdjusting() {
    if (!isVolumeAdjusting) return;
    isVolumeAdjusting = false;
    window.removeEventListener('mousemove', handleVolumeAdjust);
    window.removeEventListener('mouseup', endVolumeAdjusting);
    window.removeEventListener('touchmove', handleVolumeAdjust);
    window.removeEventListener('touchend', endVolumeAdjusting);
    resetInactivityTimer();
}
volumeSliderTrack.addEventListener('mousedown', startVolumeAdjusting);
volumeSliderTrack.addEventListener('touchstart', startVolumeAdjusting, {passive:true});

/* -------------------------------------------------------------------------
   KEYBOARD SHORTCUTS
   ------------------------------------------------------------------------- */
function handleKeyboardShortcuts(e) {
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;

    const prevent = ['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
    if (prevent.includes(e.code)) e.preventDefault();

    switch (e.code) {
        case 'Space':
        case 'KeyK': toggleVideoPlayPause(); break;
        case 'ArrowLeft': video.currentTime = Math.max(0, video.currentTime-5); resetInactivityTimer(); break;
        case 'ArrowRight': video.currentTime = Math.min(video.duration, video.currentTime+5); resetInactivityTimer(); break;
        case 'KeyJ': handleSkipBackward(); break;
        case 'KeyL': handleSkipForward(); break;
        case 'ArrowUp':
            e.preventDefault();
            video.volume = Math.min(1, video.volume+0.05);
            video.muted = false; lastKnownVolume = video.volume;
            updateVolumeSlider(); resetInactivityTimer(); break;
        case 'ArrowDown':
            e.preventDefault();
            video.volume = Math.max(0, video.volume-0.05);
            if (video.volume===0) video.muted = true;
            updateVolumeSlider(); resetInactivityTimer(); break;
        case 'KeyM': toggleMute(); break;
        case 'KeyF': toggleFullscreen(); break;
        case 'KeyC':
            if (isHlsJsMode && hlsInstance) {
                const cur = hlsInstance.subtitleTrack;
                const nextIdx = cur === -1 ? 0 : -1;
                hlsInstance.subtitleTrack = nextIdx;
                // Sync native textTracks so cues actually render
                const subs = Array.from(video.textTracks).filter(t=>t.kind==='subtitles'||t.kind==='captions');
                subs.forEach((t,i) => { t.mode = (nextIdx >= 0 && i === nextIdx) ? 'hidden' : 'disabled'; });
            } else if (video.textTracks) {
                const subs = Array.from(video.textTracks).filter(t=>t.kind==='subtitles'||t.kind==='captions');
                const showing = subs.some(t=>t.mode==='hidden');
                subs.forEach((t,i)=> t.mode = showing ? 'disabled' : (i===0?'hidden':'disabled'));
            }
            renderTracksMenu(); resetInactivityTimer();
            if (window._subtitleRendererSync) window._subtitleRendererSync();
            break;
        default:
            if (e.code.startsWith('Digit')) {
                const d = parseInt(e.code.replace('Digit',''));
                video.currentTime = (video.duration * d) / 10;
                resetInactivityTimer();
            } else if (e.code === 'Home') { video.currentTime = 0; resetInactivityTimer(); }
            else if (e.code === 'End') { video.currentTime = video.duration; resetInactivityTimer(); }
            else if (e.code === 'Comma' && video.paused) { video.currentTime = Math.max(0, video.currentTime-1/30); resetInactivityTimer(); }
            else if (e.code === 'Period' && video.paused) { video.currentTime = Math.min(video.duration, video.currentTime+1/30); resetInactivityTimer(); }
    }
}
document.addEventListener('keydown', handleKeyboardShortcuts);

/* -------------------------------------------------------------------------
   HLS / DIRECT VIDEO INITIALISATION
   ------------------------------------------------------------------------- */
function isDirectVideoUrl(url) {
    if (url && url.startsWith('blob:')) return true;
    try {
        const path = new URL(url).pathname.toLowerCase();
        return /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v|ts|mts|m2ts)(\?|$)/.test(path);
    } catch (e) {
        return /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v|ts|mts|m2ts)(\?|$)/.test(url.toLowerCase());
    }
}

function initHlsPlayer(url) {
    // Flush progress for the current episode before switching.
    // Must happen before resolvedUrl / videoStorageKey are overwritten.
    saveVideoProgress();
    if (saveProgressInterval) {
        clearInterval(saveProgressInterval);
        saveProgressInterval = null;
    }

    // Tear down any existing HLS instance cleanly before starting a new one.
    // This prevents the old instance from firing fatal error events mid-swap.
    stopProgressSaving();
    hasRestoredPosition = false;
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }
    // Remove injected subtitle tracks from previous episode
    Array.from(video.querySelectorAll('track[data-github], track[data-wyzie]')).forEach(t => t.remove());
    errorMessageDiv.classList.add('hidden');

    // Reset per-episode progress state so the new episode starts fresh.
    hasRestoredPosition = false;

    resolvedUrl     = url;
    videoStorageKey = generateStorageKey(url);

    /* ---- Direct video file (MP4, WebM, etc.) ---- */
    if (isDirectVideoUrl(url)) {
        isHlsJsMode = false;
        showLoader();
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
            renderTracksMenu(); hideLoader(); setupInactivityDetection();
            restoreVideoProgress(); startProgressSaving();
            video.play().catch(() => {});
        }, {once:true});
        video.addEventListener('error', () => {
            if (video.currentTime > 0 || video.readyState >= 2) return;
            displayError('Failed to load video: ' + (video.error ? video.error.message : 'unknown error'));
            hideLoader();
        }, {once:true});
        return;
    }

    /* ---- HLS stream (.m3u8) ---- */
    if (Hls.isSupported()) {
        isHlsJsMode = true;
        showLoader();
        const h = new Hls({
            renderTextTracksNatively: true,
            subtitleDisplay: true,
        });
        hlsInstance = h;

        h.on(Hls.Events.MEDIA_ATTACHED, () => h.loadSource(url));
        h.on(Hls.Events.MANIFEST_PARSED, () => { renderTracksMenu(); renderQualityList(); });
        h.on(Hls.Events.AUDIO_TRACK_SWITCHED, renderTracksMenu);
        h.on(Hls.Events.SUBTITLE_TRACK_SWITCHED, renderTracksMenu);
        h.on(Hls.Events.LEVEL_SWITCHED, () => { if (!speedQualityMenu.classList.contains('hidden')) renderQualityList(); });
        h.on(Hls.Events.ERROR, (ev, data) => {
            if (data.fatal) {
                displayError('Fatal HLS error');
                h.destroy();
                hideLoader();
            }
        });

        h.attachMedia(video);

        video.addEventListener('loadedmetadata', () => restoreVideoProgress(), {once:true});
        video.addEventListener('canplay', () => { hideLoader(); setupInactivityDetection(); startProgressSaving(); video.play().catch(() => {}); }, {once:true});
    }
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        isHlsJsMode = false;
        showLoader();
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
            renderTracksMenu(); hideLoader(); setupInactivityDetection();
            restoreVideoProgress(); startProgressSaving();
            video.play().catch(() => {});
        }, {once:true});
        video.addEventListener('error', () => {
            if (video.currentTime > 0 && !video.paused) return;
            displayError('Failed to load stream: ' + (video.error ? video.error.message : 'unknown error'));
            hideLoader();
        }, {once:true});
    }
    else {
        displayError('Browser does not support HLS');
        hideLoader();
    }
}

/* -------------------------------------------------------------------------
   PLAY MOVIE  –  /movie/{tmdbId}
   ------------------------------------------------------------------------- */
async function playMovie(movieId) {
    _revokeAllSubtitleBlobs();
    showLoader();

    const githubUrl =
        `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/movie/${movieId}`;

    try {
        const res = await fetch(githubUrl, { cache: 'no-store' });
        if (!res.ok) {
            if (res.status === 404) {
                showFallbackPlayer('movie', movieId);
                return;
            }
            displayError(`Could not load movie data (HTTP ${res.status}).`);
            hideLoader();
            return;
        }

        const cleanUrl = (await res.text()).trim();

        if (cleanUrl.includes('#')) {
            showDirectIframe(cleanUrl);
            return;
        }

        if (cleanUrl.toLowerCase().endsWith('.txt')) {
            showFallbackPlayer('movie', movieId);
            return;
        }

        if (cleanUrl && (cleanUrl.includes('.m3u8') || cleanUrl.includes('http'))) {
            initHlsPlayer(cleanUrl);
            loadSubtitlesFromGithub('movie', movieId);
            loadSubtitlesFromWyzie('movie', movieId);
            fetchAndSetTitle('movie', movieId);
            loadIntrodbTimestamps('movie', movieId);
        } else {
            displayError(`Invalid stream URL received for movie ${movieId}.`);
            hideLoader();
        }
    } catch (err) {
        displayError(`Failed to fetch movie data: ${err.message}`);
        hideLoader();
    }
}

/* -------------------------------------------------------------------------
   FULLSCREEN IFRAME  –  shared helper that replaces the whole player with a
   full-screen iframe pointing at the given src.
   ------------------------------------------------------------------------- */
function _renderFullscreenIframe(src) {
    hideLoader();

    document.body.innerHTML = '';
    document.body.style.margin = '0';
    document.body.style.overflow = 'hidden';

    const iframe = document.createElement('iframe');
    iframe.src = src;
    iframe.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;margin:0;padding:0;';
    iframe.setAttribute('allowfullscreen', 'true');
    iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');

    document.body.appendChild(iframe);
}

/* -------------------------------------------------------------------------
   DIRECT STREAM IFRAME  –  used when the resolved "stream URL" is actually
   an embed page (contains a `#`), not a raw .m3u8 — load it directly in an
   iframe instead of handing it to HLS.js.
   ------------------------------------------------------------------------- */
function showDirectIframe(streamUrl) {
    _renderFullscreenIframe(streamUrl);
}

/* -------------------------------------------------------------------------
   FALLBACK PLAYER  –  used when no stream is available for this title
   (e.g. GitHub returns 404). Replaces the whole player with a full-screen
   iframe pointing to an external player.
   ------------------------------------------------------------------------- */
function showFallbackPlayer(mediaType, ...idParts) {
    let src;
    if (mediaType === 'movie') {
        const [movieId] = idParts;
        src = `https://player.videasy.to/movie/${movieId}`;
    } else if (mediaType === 'tv') {
        const [seriesId, seasonNumber, episodeNumber] = idParts;
        src = `https://player.videasy.to/tv/${seriesId}/${seasonNumber}/${episodeNumber}`;
    } else {
        return;
    }

    _renderFullscreenIframe(src);
}

/* -------------------------------------------------------------------------
   PLAY EPISODE  –  /tv/{tmdbId}/S{season}/E{episode}
   ------------------------------------------------------------------------- */
async function playEpisode(seriesId, seasonNumber, episodeNumber) {
    _revokeAllSubtitleBlobs();
    // Keep episode panel state in sync
    _epPlayingSeason  = Number(seasonNumber);
    _epPlayingEpisode = Number(episodeNumber);
    _epCurrentSeason  = Number(seasonNumber); // reset panel view to playing season
    if (String(seriesId) !== _epSeriesId) {
        _epSeriesId    = String(seriesId);
        _epSeasonCache = {};
        _epLoadedSeason = null;
    }
    const expectedPath = `/tv/${seriesId}/S${seasonNumber}/E${episodeNumber}`;
    if (window.location.pathname !== expectedPath) {
        history.replaceState(null, '', expectedPath);
    }

    showLoader();

    const githubJsonUrl =
        `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/tv/${seriesId}/S${seasonNumber}.json`;

    try {
        const res = await fetch(githubJsonUrl, { cache: 'no-store' });
        if (!res.ok) {
            if (res.status === 404) {
                showFallbackPlayer('tv', seriesId, seasonNumber, episodeNumber);
                return;
            }
            displayError(`Could not load season data (HTTP ${res.status}).`);
            hideLoader();
            return;
        }

        const data   = await res.json();
        const fileId = data[episodeNumber];

        if (fileId && String(fileId).includes('#')) {
            showDirectIframe(String(fileId).trim());
            return;
        }

        if (fileId && String(fileId).trim().toLowerCase().endsWith('.txt')) {
            showFallbackPlayer('tv', seriesId, seasonNumber, episodeNumber);
            return;
        }

        if (fileId) {
            initHlsPlayer(fileId);
            loadSubtitlesFromGithub('tv', seriesId, seasonNumber, episodeNumber);
            loadSubtitlesFromWyzie('tv', seriesId, seasonNumber, episodeNumber);
            fetchAndSetTitle('tv', seriesId, seasonNumber, episodeNumber);
            loadIntrodbTimestamps('tv', seriesId, seasonNumber, episodeNumber);
        } else {
            showFallbackPlayer('tv', seriesId, seasonNumber, episodeNumber);
        }
    } catch (err) {
        displayError(`Failed to fetch episode data: ${err.message}`);
        hideLoader();
    }
}

/* -------------------------------------------------------------------------
   START  –  Route dispatcher
             Movie:    /movie/{tmdbId}
             TV:       /tv/{tmdbId}/S{season}/E{episode}
             Fallback: ?url=  or hardcoded default
   ------------------------------------------------------------------------- */
async function resolveAndPlay() {
    const path = window.location.pathname;

    const movieMatch = path.match(/\/movie\/(\d+)/i);
    if (movieMatch) {
        return playMovie(movieMatch[1]);
    }

    const tvMatch = path.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i)
                 || path.match(/\/tv\/(\d+)\/(\d+)\/(\d+)/);
    if (tvMatch) {
        return playEpisode(tvMatch[1], tvMatch[2], tvMatch[3]);
    }

    /* Fallback: ?url= query param or hardcoded default */
    const hlsUrl =
        urlParams.get('url') ||
        'https://vidmmo.com/hls/ZDBtrL1WMPQipj3EubEdG6tAKeYJ0Nt3/master.m3u8';

    initHlsPlayer(hlsUrl);
}

/* -------------------------------------------------------------------------
   TMDB TITLE FETCHING
   ------------------------------------------------------------------------- */
const TMDB_PROXY = 'https://db.wingsdatabase.com/3';

async function fetchAndSetTitle(type, id, season, episode) {
    try {
        if (type === 'movie') {
            const res = await fetch(`${TMDB_PROXY}/movie/${id}`);
            if (!res.ok) return;
            const data = await res.json();
            const title = data.title || '';
            document.getElementById('title-main-text').textContent = title;
            document.getElementById('mobile-title-main').textContent = title;
            document.title = title || document.title;

            // Evidence overlay
            document.getElementById('ev-title').textContent = title;
            document.getElementById('ev-season').style.display = 'none';
            document.getElementById('ev-episode').style.display = 'none';
            const synEl = document.getElementById('ev-synopsis');
            const synopsis = data.overview || '';
            if (synopsis) { synEl.textContent = synopsis; synEl.style.display = 'block'; }
            else synEl.style.display = 'none';

        } else if (type === 'tv') {
            const [seriesRes, epRes] = await Promise.all([
                fetch(`${TMDB_PROXY}/tv/${id}`),
                fetch(`${TMDB_PROXY}/tv/${id}/season/${season}/episode/${episode}`)
            ]);
            const series = seriesRes.ok ? await seriesRes.json() : {};
            const ep     = epRes.ok     ? await epRes.json()     : {};
            const seriesName = series.name || '';
            const epName     = ep.name    || '';
            const label      = `S${season}:E${episode}`;
            const fullTitle  = [seriesName, label, epName].filter(Boolean).join(' ');
            const mobileTitle = `${label} "${epName || seriesName}"`;
            document.getElementById('title-main-text').textContent = fullTitle;
            document.getElementById('mobile-title-main').textContent = mobileTitle;
            document.title = fullTitle || document.title;

            // Evidence overlay
            document.getElementById('ev-title').textContent = seriesName;

            // Season label — "Limited Series" if miniseries/single season, else "Season N"
            const seasonEl = document.getElementById('ev-season');
            const seasonType = series.type || '';
            let seasonLabel = '';
            if (seasonType === 'Miniseries' || Number(series.number_of_seasons) === 1) {
                seasonLabel = 'Limited Series';
            } else {
                const seasonData = (series.seasons || []).find(s => s.season_number === Number(season));
                seasonLabel = seasonData ? seasonData.name : `Season ${season}`;
            }
            if (seasonLabel) { seasonEl.textContent = seasonLabel; seasonEl.style.display = 'block'; }
            else seasonEl.style.display = 'none';

            // Episode title
            const epEl = document.getElementById('ev-episode');
            if (epName) { epEl.textContent = `Episode ${episode}: ${epName}`; epEl.style.display = 'block'; }
            else epEl.style.display = 'none';

            // Synopsis
            const synEl = document.getElementById('ev-synopsis');
            const synopsis = ep.overview || '';
            if (synopsis) { synEl.textContent = synopsis; synEl.style.display = 'block'; }
            else synEl.style.display = 'none';
        }
    } catch (e) {
        /* Silently ignore — title is non-critical */
        console.warn('fetchAndSetTitle failed:', e.message);
    }
}

/* -------------------------------------------------------------------------
   SUBTITLES FROM GITHUB subtitles.json
   ------------------------------------------------------------------------- */
const GITHUB_RAW = 'https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main';

const LANG_LABELS = {
    eng:'English', hin:'Hindi', ara:'Arabic', fra:'French', spa:'Spanish',
    por:'Portuguese', rus:'Russian', zho:'Chinese', jpn:'Japanese', kor:'Korean',
    ger:'German', ita:'Italian', tam:'Tamil', tel:'Telugu', mal:'Malayalam',
    ben:'Bengali', mar:'Marathi', urd:'Urdu', pol:'Polish', tur:'Turkish',
    nld:'Dutch', swe:'Swedish', nor:'Norwegian', dan:'Danish', fin:'Finnish',
    ind:'Indonesian', tha:'Thai', vie:'Vietnamese', ces:'Czech', hun:'Hungarian',
    ron:'Romanian', bul:'Bulgarian', hrv:'Croatian', srp:'Serbian', slk:'Slovak',
    ukr:'Ukrainian', heb:'Hebrew', fas:'Persian', msa:'Malay',
};

function langLabel(code) {
    return LANG_LABELS[code] || code.toUpperCase();
}

function srtToVtt(srt) {
    // Convert SRT subtitle format to WebVTT format (required by HTML5 <track>)
    // line:85% pushes cues above the controls bar, align:center keeps them centred
    let vtt = 'WEBVTT\n\n';
    const body = srt
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
        .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2')
        .trim();
    // Inject position cue settings on every timestamp line
    vtt += body.replace(
        /(\d{2}:\d{2}:\d{2}\.\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}\.\d{3})/g,
        '$1 line:85% position:50% align:center'
    );
    return vtt;
}

// Track blob URLs so we can revoke them when reloading
const _subtitleBlobUrls = [];

function _revokeAllSubtitleBlobs() {
    while (_subtitleBlobUrls.length) {
        URL.revokeObjectURL(_subtitleBlobUrls.pop());
    }
}

async function loadSubtitlesFromGithub(type, id, season, episode) {
    // 2-letter codes derived from languageCodeMap
    const twoLetterCodes = Object.entries(languageCodeMap)
        .filter(([code]) => code.length === 2)
        .map(([code]) => code);

    // Shared inject helper
    const injectTracks = (validTracks) => {
        const allBefore = Array.from(video.textTracks)
            .filter(t => t.kind === 'subtitles' || t.kind === 'captions');
        const showingBefore = allBefore.findIndex(t => t.mode === 'hidden');

        Array.from(video.querySelectorAll('track[data-github]')).forEach(t => t.remove());

        validTracks.forEach(({ label, blobUrl, srclang }) => {
            const track = document.createElement('track');
            track.kind    = 'subtitles';
            track.label   = label;
            track.srclang = srclang;
            track.src     = blobUrl;
            track.setAttribute('data-github', '1');
            track.default = false;
            video.appendChild(track);
        });

        if (showingBefore !== -1) {
            const allAfter = Array.from(video.textTracks)
                .filter(t => t.kind === 'subtitles' || t.kind === 'captions');
            allAfter.forEach((t, i) => {
                t.mode = (i === showingBefore) ? 'hidden' : 'disabled';
            });
        }

        renderTracksMenu();
    };

    const scheduleInject = (validTracks) => {
        if (!validTracks.length) return;
        if (video.readyState >= 1) {
            injectTracks(validTracks);
        } else {
            video.addEventListener('loadedmetadata', () => injectTracks(validTracks), { once: true });
        }
    };

    // ── TV: try Cloudinary base URL first ──────────────────────────────────
    if (type === 'tv') {
        try {
            const seasonEndpoint = `${GITHUB_RAW}/sub/tv/${id}/${season}/endpoint`;
            const baseRes = await fetch(seasonEndpoint, { cache: 'no-store' });

            if (baseRes.ok) {
                const cloudinaryBase = (await baseRes.text()).trim();

                // Fetch all language VTTs in parallel: {base}{episode}.{langCode}.vtt
                const trackData = await Promise.all(twoLetterCodes.map(async (code) => {
                    try {
                        const url = `${cloudinaryBase}${episode}.${code}.vtt`;
                        const res = await fetch(url, { cache: 'no-store' });
                        if (!res.ok) return null;
                        const vttText = await res.text();
                        const blob = new Blob([vttText], { type: 'text/vtt;charset=utf-8' });
                        const blobUrl = URL.createObjectURL(blob);
                        _subtitleBlobUrls.push(blobUrl);
                        const label = languageCodeMap[code] || code.toUpperCase();
                        return { label, blobUrl, srclang: code };
                    } catch (err) {
                        return null;
                    }
                }));

                const validTracks = trackData.filter(Boolean);
                if (validTracks.length) {
                    scheduleInject(validTracks);
                    return; // Cloudinary succeeded — skip subtitles.json
                }
            }
        } catch (e) {
            console.warn('Cloudinary subtitle fetch failed, falling back to subtitles.json:', e.message);
        }
    }

    // ── Fallback: subtitles.json (movies + TV fallback) ────────────────────
    const jsonPath = type === 'movie'
        ? `${GITHUB_RAW}/sub/movie/${id}/subtitles.json`
        : `${GITHUB_RAW}/sub/tv/${id}/${season}/${episode}/subtitles.json`;

    try {
        const res = await fetch(jsonPath, { cache: 'no-store' });
        if (!res.ok) return;

        const data = await res.json();
        const subs = data.subtitles || {};
        const langs = Object.keys(subs);
        if (!langs.length) return;

        const trackData = await Promise.all(langs.map(async (lang) => {
            try {
                const srtRes = await fetch(subs[lang], { cache: 'no-store' });
                if (!srtRes.ok) return null;
                const srtText = await srtRes.text();
                const vttText = srtToVtt(srtText);
                const blob = new Blob([vttText], { type: 'text/vtt;charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                _subtitleBlobUrls.push(blobUrl);
                return { label: langLabel(lang), blobUrl, srclang: lang };
            } catch (err) {
                console.warn(`Failed to load subtitle for ${lang}:`, err.message);
                return null;
            }
        }));

        scheduleInject(trackData.filter(Boolean));

    } catch (e) {
        console.warn('Could not load subtitles.json:', e.message);
    }
}

/* -------------------------------------------------------------------------
   SUBTITLES FROM WYZIE (OpenSubtitles proxy)
   Priority order in menu: HLS → GitHub → Wyzie

   LAZY LOADING: Only the Wyzie search API is called on page load to get
   the track list. Actual SRT files are only fetched when the user clicks
   a Wyzie subtitle. This avoids downloading 10–20 subtitle files upfront
   and makes tracks appear in the menu immediately.
   ------------------------------------------------------------------------- */
const WYZIE_API    = 'https://subs.videasy.to/search';
const WYZIE_KEY    = 'wyzie-ea127adc7693d78810f9cf157f267ea0';

async function fetchAndActivateWyzieTrack(trackEl) {
    const lazyUrl = trackEl.getAttribute('data-lazy-url');
    if (!lazyUrl) return true; // already loaded

    try {
        const srtRes = await fetch(lazyUrl, { cache: 'no-store' });
        if (!srtRes.ok) throw new Error(`HTTP ${srtRes.status}`);
        const srtText = await srtRes.text();
        const vttText = srtToVtt(srtText);
        const blob    = new Blob([vttText], { type: 'text/vtt;charset=utf-8' });
        const blobUrl = URL.createObjectURL(blob);
        _subtitleBlobUrls.push(blobUrl);
        trackEl.src = blobUrl;
        trackEl.removeAttribute('data-lazy-url');
        return true;
    } catch (err) {
        console.warn('Wyzie lazy fetch failed:', err.message);
        return false;
    }
}

let _wyzieLoading = false;

// Fetch IMDb ID from TMDB external_ids endpoint (needed by Wyzie/OpenSubtitles)
async function fetchImdbId(type, tmdbId) {
    try {
        const endpoint = type === 'movie'
            ? `${TMDB_PROXY}/movie/${tmdbId}/external_ids`
            : `${TMDB_PROXY}/tv/${tmdbId}/external_ids`;
        const res = await fetch(endpoint, { cache: 'force-cache' });
        if (!res.ok) return null;
        const data = await res.json();
        return data.imdb_id || null;
    } catch (e) {
        console.warn('fetchImdbId failed:', e.message);
        return null;
    }
}

async function loadSubtitlesFromWyzie(type, id, season, episode) {
    _wyzieLoading = true;
    renderTracksMenu(); // immediately show loading state in menu if already open
    try {
        // Wyzie/OpenSubtitles requires an IMDb ID, not a TMDB ID — resolve it first
        const imdbId = await fetchImdbId(type, id);
        if (!imdbId) { _wyzieLoading = false; renderTracksMenu(); return; }

        // Build query URL — metadata only, SRT files fetched lazily on selection
        let apiUrl = `${WYZIE_API}?id=${imdbId}`;
        if (type === 'tv') {
            apiUrl += `&season=${season}&episode=${episode}`;
        }

        const res = await fetch(apiUrl, { cache: 'no-store' });
        if (!res.ok) { _wyzieLoading = false; renderTracksMenu(); return; }

        const tracks = await res.json();
        if (!Array.isArray(tracks) || !tracks.length) { _wyzieLoading = false; renderTracksMenu(); return; }

        // Inject placeholder <track> elements immediately — no SRT fetch yet.
        // The actual SRT is downloaded only when the user selects a track.
        const inject = () => {
            // Remove previously injected Wyzie tracks before re-injecting
            Array.from(video.querySelectorAll('track[data-wyzie]')).forEach(t => t.remove());

            tracks.forEach((track) => {
                const el = document.createElement('track');
                el.kind    = 'subtitles';
                el.label   = (track.display || track.language) + (track.isHearingImpaired ? ' [CC]' : '');
                el.srclang = track.language;
                // Do NOT set el.src — store the SRT URL for lazy loading on selection
                el.setAttribute('data-wyzie', '1');
                el.setAttribute('data-lazy-url', track.url);
                el.default = false;
                video.appendChild(el);
            });

            // Tracks have no src so the browser won't auto-activate them,
            // but defensively mark any that slipped through as disabled.
            Array.from(video.textTracks)
                .filter(t => t.kind === 'subtitles' || t.kind === 'captions')
                .forEach(t => {
                    const el = Array.from(video.querySelectorAll('track[data-wyzie]'))
                        .find(el => el.track === t);
                    if (el && el.hasAttribute('data-lazy-url')) t.mode = 'disabled';
                });

            // Re-render menu so Wyzie tracks appear immediately after GitHub tracks
            _wyzieLoading = false;
            renderTracksMenu();
        };

        if (video.readyState >= 1) {
            inject();
        } else {
            video.addEventListener('loadedmetadata', inject, { once: true });
        }

    } catch (e) {
        _wyzieLoading = false;
        renderTracksMenu();
        console.warn('Wyzie subtitle load failed:', e.message);
    }
}

/* =========================================================================
   INTRODB — TIMESTAMPS  (skip intro / recap / credits / preview)
   =========================================================================

   Flow:
     1. loadIntrodbTimestamps() is called from playMovie() / playEpisode()
        once we know the TMDB ID (and season/episode for TV).
     2. It waits for video duration to be available, then fires the API
        request with duration_ms.
     3. On success, _introdbData is stored and seekbar markers are drawn.
     4. On every timeupdate the player checks whether currentTime falls
        inside any segment and shows/hides the skip prompt accordingly.
   ========================================================================= */

/**
 * Fetch timestamps for the current media item and initialise the skip UI.
 * @param {'movie'|'tv'} type
 * @param {string|number} tmdbId
 * @param {number} [season]
 * @param {number} [episode]
 */
async function loadIntrodbTimestamps(type, tmdbId, season, episode) {
    // Reset any previous state
    _introdbData        = null;
    _activeSkipSegment  = null;
    hideSkipPrompt();
    clearSeekbarMarkers();

    // We need the duration — wait until it's available
    const getDuration = () => new Promise(resolve => {
        if (video.duration && isFinite(video.duration)) {
            resolve(video.duration);
        } else {
            const handler = () => {
                if (video.duration && isFinite(video.duration)) {
                    video.removeEventListener('loadedmetadata', handler);
                    video.removeEventListener('durationchange', handler);
                    resolve(video.duration);
                }
            };
            video.addEventListener('loadedmetadata', handler);
            video.addEventListener('durationchange', handler);
        }
    });

    let duration;
    try {
        // Timeout after 10 s — don't block indefinitely
        duration = await Promise.race([
            getDuration(),
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 10000))
        ]);
    } catch (e) {
        console.warn('[IntroDB] Could not get duration:', e.message);
        return;
    }

    const durationMs = Math.round(duration * 1000);

    // Build the request URL
    const params = new URLSearchParams({ tmdb_id: tmdbId, duration_ms: durationMs });
    if (type === 'tv' && season != null && episode != null) {
        params.set('season', season);
        params.set('episode', episode);
    }

    try {
        const res = await fetch(`${INTRODB_API}?${params.toString()}`, { cache: 'no-store' });
        if (!res.ok) {
            console.warn(`[IntroDB] API returned HTTP ${res.status}`);
            return;
        }
        const data = await res.json();
        _introdbData = data;
        console.info('[IntroDB] Timestamps loaded:', data);
        drawSeekbarMarkers();
    } catch (e) {
        console.warn('[IntroDB] Fetch failed:', e.message);
    }
}

/* ---- Seekbar marker rendering ---- */

const MARKER_TYPES = ['intro', 'recap', 'credits', 'preview'];

function clearSeekbarMarkers() {
    seekBar.querySelectorAll('.seekbar-marker').forEach(el => el.remove());
}

function drawSeekbarMarkers() {
    clearSeekbarMarkers();
    if (!_introdbData || !video.duration || !isFinite(video.duration)) return;

    const duration = video.duration * 1000; // ms

    MARKER_TYPES.forEach(type => {
        const segments = _introdbData[type];
        if (!Array.isArray(segments)) return;

        segments.forEach(seg => {
            const startMs = seg.start_ms ?? 0;
            const endMs   = seg.end_ms   ?? duration;
            if (startMs >= endMs) return;

            const leftPct  = (startMs / duration) * 100;
            const widthPct = ((endMs - startMs) / duration) * 100;

            const marker = document.createElement('div');
            marker.className = `seekbar-marker ${type}`;
            marker.style.left  = `${leftPct}%`;
            marker.style.width = `${widthPct}%`;
            marker.title = type.charAt(0).toUpperCase() + type.slice(1);
            // Insert behind progress/buffer layers
            seekBar.insertBefore(marker, seekBar.firstChild);
        });
    });
}

/* ---- Skip prompt show/hide ---- */

const skipPromptEl  = document.getElementById('skip-prompt');
const skipPromptBtn = document.getElementById('skip-prompt-btn');

const SKIP_LABELS = {
    intro:   'Skip Intro',
    recap:   'Skip Recap',
    credits: 'Skip Credits',
    preview: 'Skip Preview',
};

function showSkipPrompt(type, endMs) {
    _activeSkipSegment = { type, end_ms: endMs };
    skipPromptBtn.textContent = SKIP_LABELS[type] || 'Skip';
    skipPromptEl.classList.add('visible');
}

function hideSkipPrompt() {
    _activeSkipSegment = null;
    skipPromptEl.classList.remove('visible');
}

/** Called by the onclick on the skip button */
function skipPromptAction() {
    if (!_activeSkipSegment) return;
    const endSec = _activeSkipSegment.end_ms / 1000;
    // Clamp to valid range
    video.currentTime = Math.min(endSec, video.duration - 0.1);
    hideSkipPrompt();
    resetInactivityTimer();
}

/**
 * Called on every timeupdate. Checks whether currentTime sits inside
 * any known segment and updates the skip prompt accordingly.
 * Priority: intro > recap > credits > preview (first match wins).
 */
function checkIntrodbSegments() {
    if (!_introdbData || !video.duration || video.paused) {
        // Hide if paused (Netflix behaviour: prompt only while playing)
        if (video.paused && _activeSkipSegment) hideSkipPrompt();
        return;
    }

    const nowMs = video.currentTime * 1000;
    const totalMs = video.duration * 1000;

    for (const type of MARKER_TYPES) {
        const segments = _introdbData[type];
        if (!Array.isArray(segments)) continue;

        for (const seg of segments) {
            const startMs = seg.start_ms ?? 0;
            const endMs   = seg.end_ms   ?? totalMs;
            if (nowMs >= startMs && nowMs < endMs) {
                // We're inside this segment
                if (!_activeSkipSegment || _activeSkipSegment.type !== type) {
                    showSkipPrompt(type, endMs);
                }
                return;
            }
        }
    }

    // Not inside any segment
    if (_activeSkipSegment) hideSkipPrompt();
}

/* -------------------------------------------------------------------------
   DRAG & DROP LOCAL VIDEO
   ------------------------------------------------------------------------- */
(function () {
    const ACCEPTED = /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v|ts|mts|m2ts)$/i;
    const dragOverlay = document.getElementById('drag-overlay');

    function hasVideoInTransfer(dt) {
        if (!dt) return false;
        // During dragenter/dragover, types is available even before files are accessible
        const types = Array.from(dt.types || []);
        return types.includes('Files');
    }

    function getVideoFile(dt) {
        if (!dt) return null;
        const files = Array.from(dt.files || []);
        return files.find(f => f.type.startsWith('video/') || ACCEPTED.test(f.name)) || null;
    }

    function showOverlay() { dragOverlay.style.display = 'flex'; }
    function hideOverlay() { dragOverlay.style.display = 'none'; }

    // Use dragenter/dragleave on window to catch all drags reliably
    window.addEventListener('dragenter', e => {
        if (!hasVideoInTransfer(e.dataTransfer)) return;
        e.preventDefault();
        showOverlay();
    });

    // Only hide when leaving the window entirely (relatedTarget is null)
    window.addEventListener('dragleave', e => {
        if (e.relatedTarget === null) hideOverlay();
    });

    window.addEventListener('dragover', e => {
        if (!hasVideoInTransfer(e.dataTransfer)) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
    });

    window.addEventListener('drop', e => {
        e.preventDefault();
        hideOverlay();
        const videoFile = getVideoFile(e.dataTransfer);
        if (!videoFile) return;
        if (window._localVideoBlobUrl) { URL.revokeObjectURL(window._localVideoBlobUrl); window._localVideoBlobUrl = null; }
        const blobUrl = URL.createObjectURL(videoFile);
        window._localVideoBlobUrl = blobUrl;
        // Tag the blob URL with the original filename so initHlsPlayer can detect the type
        window._localVideoBlobName = videoFile.name;
        const iframe = document.getElementById('fallback-iframe');
        if (iframe) iframe.remove();
        const name = videoFile.name.replace(/\.[^.]+$/, '');
        const t1 = document.getElementById('title-main-text');
        const t2 = document.getElementById('mobile-title-main');
        if (t1) t1.textContent = name;
        if (t2) t2.textContent = name;
        document.title = name;
        showToast('\u25b6 ' + videoFile.name);
        initHlsPlayer(blobUrl);
    });
})();

/* =========================================================================
   NETFLIX-STYLE CUSTOM SUBTITLE RENDERER
   - Uses mode:'hidden' so browser parses cues but never renders natively
   - Listens to cuechange on the active track and renders into #player-timedtext
   ========================================================================= */
(function() {
    const timedtext = document.getElementById('player-timedtext');
    let _activeTrack   = null;
    let _cueListener   = null;

    function clearSubtitle() {
        timedtext.innerHTML = '';
    }

    function renderCue(track) {
        timedtext.innerHTML = '';
        if (!track || !track.activeCues || track.activeCues.length === 0) return;

        // Collect all active cue texts (usually just one, but handle multiples)
        const lines = [];
        for (let i = 0; i < track.activeCues.length; i++) {
            const cue = track.activeCues[i];
            // Strip VTT tags like <b>, <i>, <c.color>, <00:00:00.000> timestamp tags
            const text = cue.text
                .replace(/<\d{2}:\d{2}:\d{2}\.\d{3}>/g, '')  // timestamp tags
                .replace(/<[^>]+>/g, '')                        // all other tags
                .replace(/&amp;/g, '&')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&nbsp;/g, '\u00a0')
                .trim();
            if (text) lines.push(text);
        }
        if (!lines.length) return;

        const combined = lines.join('\n');

        // Build exact Netflix DOM structure with inline styles
        const container = document.createElement('div');
        container.className = 'player-timedtext-text-container';
        // Netflix-style: left is set to (position - ~10)% to visually center the block
        // We'll insert, measure, then reposition — but set an initial estimate
        const subtitleBottom =
        bottomOverlay.classList.contains('controls-hidden')
        ? '10%'
        : '14%';

        container.style.cssText =`display:block;white-space:nowrap;text-align:center;position:absolute;left:50%;bottom:${subtitleBottom};transform:translateX(-50%);`;

        const outer = document.createElement('span');
        outer.style.cssText = 'display:inline-block;text-align:center';

        const inner = document.createElement('span');
        inner.style.cssText = 'font-size: 4.8vh;line-height:normal;font-weight:normal;color:#ffffff;text-shadow:#000000 0px 0px 7px;font-family:Netflix Sans,Helvetica Neue,Helvetica,Arial,sans-serif;font-weight:bolder';

        // Handle newlines — render as <br>
        combined.split('\n').forEach((line, idx, arr) => {
            inner.appendChild(document.createTextNode(line));
            if (idx < arr.length - 1) inner.appendChild(document.createElement('br'));
        });

        outer.appendChild(inner);
        container.appendChild(outer);
        timedtext.appendChild(container);
    }

    function detachTrack() {
        if (_activeTrack && _cueListener) {
            _activeTrack.removeEventListener('cuechange', _cueListener);
        }
        _activeTrack  = null;
        _cueListener  = null;
        clearSubtitle();
    }

    function attachTrack(track) {
        detachTrack();
        if (!track) return;
        _activeTrack = track;
        _cueListener = () => renderCue(track);
        track.addEventListener('cuechange', _cueListener);
        // Render any already-active cues immediately (e.g. seek into a cue)
        renderCue(track);
    }

    // Watch for changes to which track is active (mode:'hidden' = active for us)
    function syncActiveTrack() {
        const video = document.getElementById('video');
        if (!video || !video.textTracks) return;
        const subs = Array.from(video.textTracks)
            .filter(t => t.kind === 'subtitles' || t.kind === 'captions');
        const active = subs.find(t => t.mode === 'hidden') || null;
        if (active === _activeTrack) return;
        attachTrack(active);
    }

    // Poll textTracks for mode changes (fired by handleTrackSelection, keyboard, etc.)
    // Also listen to addtrack so newly injected tracks are caught
    function initRenderer() {
        const video = document.getElementById('video');
        if (!video) return;

        // Observe textTracks list changes
        video.textTracks.addEventListener('addtrack',    syncActiveTrack);
        video.textTracks.addEventListener('removetrack', syncActiveTrack);
        video.textTracks.addEventListener('change',      syncActiveTrack);

        // Initial sync in case tracks already exist
        syncActiveTrack();
    }

    // Wait until video element is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initRenderer);
    } else {
        initRenderer();
    }

    // Expose so handleTrackSelection can nudge the renderer after track switches
    window._subtitleRendererSync = syncActiveTrack;
})();

/* -------------------------------------------------------------------------
   EPISODE PANEL
   ------------------------------------------------------------------------- */
const episodePanel         = document.getElementById('episode-panel');
const episodePanelBackdrop = document.getElementById('episode-panel-backdrop');
const episodePanelClose    = document.getElementById('episode-panel-close');
const episodePanelTitle    = document.getElementById('episode-panel-title');
const seasonSelect             = document.getElementById('season-select');
const episodeListContainer = document.getElementById('episode-list-container');
const episodePanelLoading  = document.getElementById('episode-panel-loading');
const episodePanelError    = document.getElementById('episode-panel-error');
const episodeList          = document.getElementById('episode-list');
const episodePanelButton   = document.getElementById('episode-panel-button');

/* State */
let _epSeriesId       = null;
let _epTotalSeasons   = 0;
let _epPlayingSeason  = null;  // season that is actually playing
let _epPlayingEpisode = null;  // episode that is actually playing
let _epCurrentSeason  = null;  // season currently shown in panel (may differ when browsing)
let _epSeriesName     = '';
let _epSeasonCache    = {}; // season number → episode array

function openEpisodePanel() {
    const tvMatch = window.location.pathname.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);
    if (!tvMatch) return;

    const seriesId     = tvMatch[1];
    const seasonNumber = Number(tvMatch[2]);
    const epNumber     = Number(tvMatch[3]);

    // Always update playing state from current URL
    _epPlayingSeason  = seasonNumber;
    _epPlayingEpisode = epNumber;

    episodePanel.classList.add('open');
    episodePanelBackdrop.classList.add('open');
    clearTimeout(inactivityTimer);

    // Close other menus
    audioSubtitleMenu.classList.add('hidden');
    speedQualityMenu.classList.add('hidden');

    // If same series — sync state and re-render (but re-fetch metadata if select not yet built)
    if (seriesId === _epSeriesId) {
        _epCurrentSeason = seasonNumber; // reset panel view to playing season

        // If the select was never populated (e.g. panel opened for first time after playEpisode set _epSeriesId)
        if (seasonSelect.options.length === 0 || (seasonSelect.options.length === 1 && seasonSelect.options[0].value === '')) {
            fetchSeriesInfo(seriesId);
            return;
        }

        // Sync dropdown to playing season
        if (seasonSelect.value !== String(seasonNumber)) {
            seasonSelect.value = seasonNumber;
        }
        if (_epCurrentSeason !== _epLoadedSeason) {
            loadEpisodeSeason(_epCurrentSeason);
        } else {
            renderEpisodeList(_epSeasonCache[_epCurrentSeason] || []);
        }
        return;
    }

    // New series — fetch metadata
    _epSeriesId      = seriesId;
    _epCurrentSeason = seasonNumber;
    _epTotalSeasons  = 0;
    _epSeriesName    = '';
    _epSeasonCache   = {};
    _epLoadedSeason  = null;

    seasonSelect.innerHTML = '<option value="">Loading seasons…</option>';
    episodeList.innerHTML = '';
    episodePanelLoading.style.display = 'flex';
    episodePanelError.style.display   = 'none';

    fetchSeriesInfo(seriesId);
}

let _epLoadedSeason = null;

async function fetchSeriesInfo(seriesId) {
    try {
        const res = await fetch(`${TMDB_PROXY}/tv/${seriesId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        _epSeriesName  = data.name || '';
        _epTotalSeasons = data.number_of_seasons || 1;
        episodePanelTitle.textContent = _epSeriesName || 'Episodes';

        // Build season selector dropdown (skip season 0 / specials unless only option)
        let seasons = (data.seasons || []).filter(s => s.season_number > 0);
        if (!seasons.length) {
            const total = data.number_of_seasons || 1;
            for (let i = 1; i <= total; i++) seasons.push({ season_number: i, name: `Season ${i}` });
        }

        seasonSelect.innerHTML = '';
        seasons.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.season_number;
            opt.textContent = s.name || `Season ${s.season_number}`;
            if (Number(s.season_number) === Number(_epCurrentSeason)) opt.selected = true;
            seasonSelect.appendChild(opt);
        });

        // Ensure the select actually shows the right season (fallback if none matched)
        if (!seasonSelect.value && seasons.length) {
            seasonSelect.value = seasons[0].season_number;
            _epCurrentSeason   = Number(seasons[0].season_number);
        }

        seasonSelect.onchange = () => {
            const chosen = Number(seasonSelect.value);
            // Do NOT overwrite _epCurrentSeason — that tracks what's actually playing.
            // _epLoadedSeason will be updated inside loadEpisodeSeason.
            loadEpisodeSeason(chosen);
        };

        // Load the currently playing season
        loadEpisodeSeason(_epCurrentSeason);
    } catch (e) {
        console.error('[EpisodePanel] fetchSeriesInfo failed:', e);
        episodePanelLoading.style.display = 'none';
        episodePanelError.style.display   = 'flex';
        episodePanelError.textContent     = `Could not load season list: ${e.message}`;
    }
}

async function loadEpisodeSeason(seasonNumber) {
    if (_epSeasonCache[seasonNumber]) {
        _epLoadedSeason = seasonNumber;
        renderEpisodeList(_epSeasonCache[seasonNumber]);
        return;
    }

    episodePanelLoading.style.display = 'flex';
    episodePanelError.style.display   = 'none';
    episodeList.innerHTML = '';

    try {
        const res = await fetch(`${TMDB_PROXY}/tv/${_epSeriesId}/season/${seasonNumber}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const episodes = data.episodes || [];
        _epSeasonCache[seasonNumber] = episodes;
        _epLoadedSeason = seasonNumber;
        renderEpisodeList(episodes);
    } catch (e) {
        console.warn('[EpisodePanel] loadEpisodeSeason failed:', e.message);
        episodePanelLoading.style.display = 'none';
        episodePanelError.style.display   = 'flex';
    }
}

function renderEpisodeList(episodes) {
    episodePanelLoading.style.display = 'none';
    episodePanelError.style.display   = 'none';
    episodeList.innerHTML = '';

    if (!episodes.length) {
        episodeList.innerHTML = '<li style="padding:20px;color:#b3b3b3;font-size:14px;">No episodes found.</li>';
        return;
    }

    episodes.forEach(ep => {
        const epNum    = ep.episode_number;
        const isActive = (_epLoadedSeason === _epPlayingSeason) && (epNum === _epPlayingEpisode);

        const li = document.createElement('li');
        li.className = 'episode-item' + (isActive ? ' active' : '');

        // Thumbnail
        const thumbWrapper = document.createElement('div');
        thumbWrapper.className = 'episode-thumb-wrapper';

        const thumbImg = document.createElement('img');
        thumbImg.alt = ep.name || '';
        thumbImg.loading = 'lazy';
        if (ep.still_path) {
            thumbImg.src = `https://image.tmdb.org/t/p/w300${ep.still_path}`;
            thumbImg.onerror = () => { thumbImg.src = ''; thumbImg.style.background = '#2a2a2a'; };
        } else {
            thumbImg.style.background = '#2a2a2a';
        }
        thumbWrapper.appendChild(thumbImg);

        // Play overlay icon
        const playOverlay = document.createElement('div');
        playOverlay.className = 'episode-thumb-play';
        playOverlay.innerHTML = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M5 2.7a1 1 0 0 1 1.48-.88l16.93 9.3a1 1 0 0 1 0 1.76l-16.93 9.3A1 1 0 0 1 5 21.31z"/></svg>`;
        thumbWrapper.appendChild(playOverlay);
        li.appendChild(thumbWrapper);

        // Info
        const info = document.createElement('div');
        info.className = 'episode-info';

        const numTitle = document.createElement('div');
        numTitle.className = 'episode-num-title';

        const num = document.createElement('span');
        num.className = 'episode-number';
        num.textContent = `E${epNum}`;

        const name = document.createElement('span');
        name.className = 'episode-name';
        name.textContent = ep.name || `Episode ${epNum}`;

        numTitle.appendChild(num);
        numTitle.appendChild(name);
        info.appendChild(numTitle);

        if (ep.overview) {
            const overview = document.createElement('p');
            overview.className = 'episode-overview';
            overview.textContent = ep.overview;
            info.appendChild(overview);
        }

        li.appendChild(info);

        li.addEventListener('click', () => {
            if (isActive) { closeEpisodePanel(); return; }
            playEpisode(_epSeriesId, _epLoadedSeason, epNum);
            closeEpisodePanel();
        });

        episodeList.appendChild(li);
    });

    // Scroll the active episode into view only when browsing the playing season
    if (_epLoadedSeason === _epPlayingSeason) {
        requestAnimationFrame(() => {
            const activeEl = episodeList.querySelector('.episode-item.active');
            if (activeEl) activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
        });
    }
}

function closeEpisodePanel() {
    episodePanel.classList.remove('open');
    episodePanelBackdrop.classList.remove('open');
    resetInactivityTimer();
}

episodePanelButton.addEventListener('click', e => {
    e.stopPropagation();
    if (episodePanel.classList.contains('open')) {
        closeEpisodePanel();
    } else {
        openEpisodePanel();
    }
});
episodePanelClose.addEventListener('click', closeEpisodePanel);
episodePanelBackdrop.addEventListener('click', closeEpisodePanel);

// Hide episode panel button on movie routes; show on TV
function updateEpisodePanelButtonVisibility() {
    const isTv = /\/tv\/\d+\/S\d+\/E\d+/i.test(window.location.pathname)
              || /\/tv\/\d+\/\d+\/\d+/.test(window.location.pathname);
    episodePanelButton.classList.toggle('hidden', !isTv);
}

window.onload = () => {
    // Seed playing state from URL so episode panel works correctly on first open
    const tvMatch = window.location.pathname.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i)
                 || window.location.pathname.match(/\/tv\/(\d+)\/(\d+)\/(\d+)/);
    if (tvMatch) {
        _epSeriesId       = tvMatch[1];
        _epPlayingSeason  = Number(tvMatch[2]);
        _epPlayingEpisode = Number(tvMatch[3]);
        _epCurrentSeason  = _epPlayingSeason;
    }
    setupUIControls(); resolveAndPlay();
};

const reportModal = document.getElementById('reportModal');
const issueTypeSelect = document.getElementById('issueType');
const submitBtn = document.getElementById('submitBtn');

document.getElementById('report-button').addEventListener('click', openReportModal);

issueTypeSelect.addEventListener('change', () => {
  submitBtn.disabled = issueTypeSelect.value === '';
});

function openReportModal() {
  reportModal.classList.add('active');
}

function closeReportModal() {
  reportModal.classList.remove('active');
}

// Close when clicking backdrop
reportModal.addEventListener('click', (e) => {
  if (e.target === reportModal) closeReportModal();
});




async function submitIssue() {
  const type = issueTypeSelect.value;
  const desc = document.getElementById('issueDesc').value;
  submitBtn.disabled = true;
  try {
    const res = await fetch('https://report.bingeoutofficial.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        issueType: type,
        description: desc,
        pageUrl: location.href,
        referrer: document.referrer || 'Direct / Unknown'
      })
    });
    if (!res.ok) throw new Error('Failed');
    alert('Issue reported successfully');
    closeReportModal();
    issueTypeSelect.value = '';
    document.getElementById('issueDesc').value = '';
    submitBtn.disabled = true;
  } catch (e) {
    alert('Failed to report issue. Try again.');
  } finally {
    submitBtn.disabled = issueTypeSelect.value === '';
  }
}

// Video Fit Toggle
const fitModes = ['object-cover', 'object-contain', 'object-fill'];
const fitLabels = { 'object-cover': 'Cover', 'object-contain': 'Contain', 'object-fill': 'Fill' };
let fitIndex = 0; // starts at cover (matches current class)

const fitButton = document.getElementById('fit-button');

const svgClass = `class="text-white w-6 h-6 md:w-full md:h-full"`;
function updateFitIcon(mode) {
  if (mode === 'object-cover') {
    // Cover: outward arrows on a rectangle
    fitButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" ${svgClass} viewBox="0 0 24 16"><path fill="currentColor" d="M0 0h5v2H2v3H0zm19 0h5v5h-2V2h-3zM0 11h2v3h3v2H0zm22 3h-3v2h5v-5h-2zM1 1h22v14H1z" fill-rule="evenodd" clip-rule="evenodd"/></svg>`;
  } else if (mode === 'object-contain') {
    // Contain: inward arrows on a rectangle
    fitButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" ${svgClass} viewBox="0 0 24 16"><path fill="currentColor" d="M0 0h5v2H2v3H0zm19 0h5v5h-2V2h-3zM0 11h2v3h3v2H0zm22 3h-3v2h5v-5h-2zM7 4h10v8H7z"/></svg>`;
  } else {
    // Fill: solid filled rectangle
    fitButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" ${svgClass} viewBox="0 0 24 16"><rect x="0" y="0" width="24" height="16" fill="currentColor"/></svg>`;
  }
}

fitButton.addEventListener('click', () => {
  // Remove current fit class
  video.classList.remove(fitModes[fitIndex]);
  // Advance to next
  fitIndex = (fitIndex + 1) % fitModes.length;
  const newMode = fitModes[fitIndex];
  video.classList.add(newMode);

  // Show toast
  showToast(`Fit: ${fitLabels[newMode]}`);
});

function showToast(msg) {
  let toast = document.getElementById('fit-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'fit-toast';
    toast.style.cssText = 'position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity 0.3s;';
    document.getElementById('video-container').appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.style.opacity = '0', 1500);
}
